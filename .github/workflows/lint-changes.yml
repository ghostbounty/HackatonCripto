name: lint-changes

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  lint-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required change artifacts
        run: |
          for dir in changes/*; do
            [ -d "$dir" ] || continue
            test -f "$dir/proposal.md"
            test -f "$dir/spec.md"
            test -f "$dir/design.md"
            test -f "$dir/tasks.md"
            test -f "$dir/progress.md"
          done
      - name: Check autonomous gate references
        run: |
          grep -q "traceable-humanitarian-delivery-on-avalanche" AGENTS.md
          grep -q "Playwright CLI" AGENTS.md
          grep -q "MilestoneEscrow" docs/architecture.md
          grep -q "Avalanche C-Chain" docs/product/blockchain-scope.md
